name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:
  # Sync Google Sheets + rebuild 3×/jour (America/Toronto) — voir DEPLOY.md
  # Cron UTC: 16:00, 20:00, 22:00 = 12h, 16h, 18h EDT (été, UTC-4)
  # En EST (hiver, UTC-5): ajuster à 17:00, 21:00, 23:00 UTC si besoin
  schedule:
    - cron: "0 16,20,22 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix client

      - name: Build static snapshot and client
        env:
          # Base `/` pour domaine custom (sharpsheettips.com). L'URL github.io/sports-bet-coach/ ne fonctionnera plus tant que le domaine custom n'est pas configuré dans Settings → Pages.
          VITE_BASE: /
          VITE_STATIC_API: "true"
          VITE_CLIENT_SYNC: "true"
          DRATINGS_ENABLED: "true"
        run: npm run build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
