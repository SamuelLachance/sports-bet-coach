name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:
  # Daily rebuild after Sports Odds algo (3:00 Toronto) — voir DEPLOY.md
  # Cron UTC 08:00 = 4:00 EDT (1h after algo); en EST utiliser 09:00 UTC pour 4:00 local
  schedule:
    # 08:00 UTC = 4:00 Toronto — morning sync after Sports Odds algo
    - cron: "0 8 * * *"
    # 07:00 UTC = 3:00 Toronto — re-grade finished games before morning sync
    - cron: "0 7 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix client

      - name: Build static snapshot and client
        env:
          # Base `/` pour domaine custom (sharpsheettips.com). L'URL github.io/sports-bet-coach/ ne fonctionnera plus tant que le domaine custom n'est pas configuré dans Settings → Pages.
          VITE_BASE: /
          VITE_STATIC_API: "true"
          VITE_CLIENT_SYNC: "true"
        run: npm run build:pages

      - name: Commit updated bet tracking store
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tracking.json
          if git diff --staged --quiet; then
            echo "No tracking store changes to commit"
          else
            git commit -m "Update bet tracking store after daily sync [skip ci]"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
